<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubarkULTRA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d; /* Keeps the deep black frame border */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Fixed Navigation Bar at the top */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(13, 13, 13, 0.9) 60%, rgba(13, 13, 13, 0));
            z-index: 1000;
        }

        .navbar a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .navbar a:hover, .navbar a.active {
            color: #ffffff;
        }

        /* Container to keep logo perfectly centered dynamically */
        .content-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px; /* Prevents overlap with the navbar */
        }

        /* Displays the exact image file without losing layout proportions */
        .source-viewport {
            width: 100%;
            max-width: 1000px; /* Restricts maximum width to preserve crispness */
            height: auto;
            aspect-ratio: 16 / 9;
            display: block;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border-radius: 4px; /* Matches the organic corner falloff of the file */
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="dash1a.html">Dashboard 1a</a>
        <a href="icu-rounding/">ICU Rounding</a>
    </nav>

    <div class="content-container">
        <img src="KubarkULTRA_LOGO.png" alt="KubarkULTRA" class="source-viewport">
    </div>

</body>
</html>
