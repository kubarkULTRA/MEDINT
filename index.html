<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubarkULTRA</title>
    <style>
        /* Import a gritty, textured typewriter style font */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* 1960s Photocopy Dossier Canvas */
        .document-canvas {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background-color: #e6e4df;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.35), 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #c8c6c1;
            
            /* Mimicking old paper texture, grain, and chemical discoloration */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.45) 0%, transparent 80%),
                radial-gradient(circle at 80% 20%, rgba(0, 0, 0, 0.05) 0%, transparent 40%),
                linear-gradient(to bottom, rgba(0,0,0,0.02) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.04) 100%);
        }

        /* Chemical/Ink smudges on the margins */
        .document-canvas::before {
            content: '';
            position: absolute;
            right: 5%;
            bottom: 5%;
            width: 120px;
            height: 180px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.08) 0%, transparent 70%);
            transform: rotate(15deg);
            filter: blur(5px);
            pointer-events: none;
        }

        /* High-contrast, bleeding stamp effect for the text */
        h1 {
            font-family: 'Special Elite', 'Courier New', monospace;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            color: #1a1a1a;
            font-weight: 700;
            letter-spacing: -1px;
            user-select: none;
            
            /* Ink-bleed simulation using a mix of subtle text-shadows and blur */
            text-shadow: 
                0.5px 0.5px 1px rgba(0, 0, 0, 0.9), 
                -0.5px -0.5px 1px rgba(0, 0, 0, 0.5),
                0 0 2px rgba(0,0,0,0.3);
            filter: contrast(200%) brightness(90%) blur(0.2px);
            opacity: 0.95;
            transform: rotate(-0.5deg); /* Slight alignment imperfection */
        }
    </style>
</head>
<body>

    <div class="document-canvas">
        <h1>KubarkULTRA</h1>
    </div>

</body>
</html>
