<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubarkULTRA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d; /* Dark vignette frame border */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* The Photocopy Document Canvas matching watermarked_img_5158360398786625533.png */
        .document-canvas {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background-color: #e2e1dd; /* Vintage aged paper hue */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.4), 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            border: 1px solid #c5c3be;
            
            /* Atmospheric paper textures, stains, and lighting gradients */
            background-image: 
                radial-gradient(circle at 85% 85%, rgba(0, 0, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.4) 0%, transparent 50%),
                linear-gradient(to right, rgba(0,0,0,0.03) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.03) 100%);
        }

        /* Subtle photocopy edge smudges */
        .document-canvas::before {
            content: '';
            position: absolute;
            top: 0;
            right: 10%;
            bottom: 0;
            width: 45px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.04) 30%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.03) 70%, transparent);
            filter: blur(4px);
            pointer-events: none;
        }

        /* Centered logo wrapper */
        .logo-container {
            width: 85%;
            max-width: 750px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Renders the CABLECRIT_LOGO_ICON-TEXT.png layout cleanly */
        .logo-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            
            /* Replicates the raw, high-contrast ink bleed of a 1960s Xerox */
            filter: contrast(110%) brightness(95%) multiply;
            opacity: 0.95;
        }
    </style>
</head>
<body>

    <!-- Main Dossier Viewport -->
    <div class="document-canvas">
        <div class="logo-container">
            <!-- Pulls your uploaded file dynamically from your GitHub folder -->
            <img src="CABLECRIT_LOGO_ICON-TEXT.png" alt="KubarkULTRA" class="logo-img">
        </div>
    </div>

</body>
</html>
