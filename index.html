<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubarkULTRA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d; /* Keeps the deep black frame border */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Displays the exact image file without losing layout proportions */
        .source-viewport {
            width: 100%;
            max-width: 1000px; /* Restricts maximum width to preserve crispness */
            height: auto;
            aspect-ratio: 16 / 9;
            display: block;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border-radius: 4px; /* Matches the organic corner falloff of the file */
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Renders your uploaded asset flawlessly -->
    <img src="KubarkULTRA_LOGO.png" alt="KubarkULTRA" class="source-viewport">

</body>
</html>
